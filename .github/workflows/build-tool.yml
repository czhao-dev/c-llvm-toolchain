name: build-tool CI

on:
  push:
    paths:
      - "build-tool/**"
      - ".github/workflows/build-tool.yml"
  pull_request:
    paths:
      - "build-tool/**"
      - ".github/workflows/build-tool.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: build-tool
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure
        run: ./scripts/configure.sh
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Smoke test
        run: |
          bin="$PWD/build/build-tool"
          workdir=$(mktemp -d)
          printf 'all:\n\techo smoke test ok\n' > "$workdir/Makefile"
          cd "$workdir"
          "$bin"
