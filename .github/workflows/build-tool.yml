name: build-tool CI

on:
  push:
    paths:
      - "build-tool/**"
      - ".github/workflows/build-tool.yml"
  pull_request:
    paths:
      - "build-tool/**"
      - ".github/workflows/build-tool.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: build-tool
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test
      - name: Smoke test
        run: |
          cargo build --bin build-tool
          bin="$PWD/target/debug/build-tool"
          workdir=$(mktemp -d)
          printf 'all:\n\techo smoke test ok\n' > "$workdir/Makefile"
          cd "$workdir"
          "$bin" -j4
